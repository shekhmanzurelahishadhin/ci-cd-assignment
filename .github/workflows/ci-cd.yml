name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

env:
  NODE_VERSION: '22'
  APP_PORT: 3000

jobs:
  # ==================== TEST JOB ====================
  test:
    name: Test Application
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      # Step 3: Install dependencies
      - name: Install Dependencies
        run: npm ci
      
      # Step 4: Run tests and capture results
      - name: Run Tests
        id: tests
        run: |
          echo "========================================"
          echo "Running Application Tests"
          echo "========================================"
          echo "Test started at: $(date)" > test-results.txt
          echo "========================================" >> test-results.txt
          
          # Run the test command and capture output
          if npm run check >> test-results.txt 2>&1; then
            echo "✅ Tests PASSED" >> test-results.txt
            echo "TEST_STATUS=passed" >> $GITHUB_OUTPUT
          else
            echo "❌ Tests FAILED" >> test-results.txt
            echo "TEST_STATUS=failed" >> $GITHUB_OUTPUT
            cat test-results.txt
            exit 1
          fi
          
          echo "========================================" >> test-results.txt
          echo "Test completed at: $(date)" >> test-results.txt
          
          # Display results in console
          cat test-results.txt
      
      # Step 5: Upload test results as artifact
      - name: Upload Test Results Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.txt
          retention-days: 7
          if-no-files-found: error
      
      # Step 6: Upload test logs for debugging (if needed)
      - name: Upload Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            test-results.txt
            .npm/_logs/
          retention-days: 3

  # ==================== DEPLOY JOB ====================
  deploy:
    name: Deploy to Self-Hosted Runner
    needs: test  # Depends on test job
    runs-on: self-hosted  # Use self-hosted runner
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      # Step 1: Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      # Step 2: Download test results artifact
      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: ./test-artifacts
      
      # Step 3: Display test results content
      - name: Display Test Results
        run: |
          echo "========================================"
          echo "📋 TEST RESULTS FROM TEST JOB"
          echo "========================================"
          if [ -f "./test-artifacts/test-results.txt" ]; then
            cat ./test-artifacts/test-results.txt
            echo "========================================"
            echo "✅ Test results loaded successfully"
          else
            echo "⚠️ Warning: Test results file not found!"
          fi
      
      # Step 4: Setup Node.js on self-hosted runner
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      # Step 5: Install dependencies
      - name: Install Dependencies
        run: npm ci
      
      # Step 6: Stop existing application (if running)
      - name: Stop Existing Application
        run: |
          echo "🛑 Stopping existing application..."
          # Stop using PM2 if running
          if command -v pm2 &> /dev/null; then
            pm2 delete node-app || true
            pm2 save || true
          fi
          
          # Also kill any process on port 3000
          sudo fuser -k ${{ env.APP_PORT }}/tcp || true
        continue-on-error: true
      
      # Step 7: Deploy application
      - name: Deploy Application
        id: deploy
        run: |
          echo "========================================"
          echo "🚀 DEPLOYING APPLICATION"
          echo "========================================"
          echo "Deployment started at: $(date)"
          
          # Install PM2 globally if not present
          if ! command -v pm2 &> /dev/null; then
            echo "📦 Installing PM2..."
            npm install -g pm2
          fi
          
          # Start application with PM2
          echo "▶️ Starting application with PM2..."
          pm2 start src/server.js --name node-app --time
          
          # Save PM2 configuration
          pm2 save
          
          # Setup PM2 to start on boot
          pm2 startup || true
          
          # Wait for application to start
          sleep 5
          
          # Verify application is running
          echo "🔍 Verifying application..."
          if curl -s http://localhost:${{ env.APP_PORT }}/ > /dev/null; then
            echo "✅ Application is running on port ${{ env.APP_PORT }}"
            echo "DEPLOY_STATUS=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Application failed to start"
            pm2 logs node-app --lines 20
            exit 1
          fi
          
          echo "Deployment completed at: $(date)"
      
      # Step 8: Verify API endpoint
      - name: Verify API Endpoint
        run: |
          echo "========================================"
          echo "🔍 VERIFYING API ENDPOINT"
          echo "========================================"
          API_RESPONSE=$(curl -s http://localhost:${{ env.APP_PORT }}/api)
          echo "API Response: $API_RESPONSE"
          
          if echo "$API_RESPONSE" | grep -q "json"; then
            echo "✅ API endpoint is working correctly"
          else
            echo "⚠️ API endpoint response may need verification"
          fi
      
      # Step 9: Display PM2 status
      - name: Show PM2 Status
        run: |
          echo "========================================"
          echo "📊 PM2 PROCESS STATUS"
          echo "========================================"
          pm2 status
          echo "========================================"
          echo "📋 Recent logs:"
          pm2 logs node-app --lines 10 --nostream
      
      # Step 10: Deployment summary
      - name: Deployment Summary
        run: |
          echo "========================================"
          echo "🎉 DEPLOYMENT COMPLETE"
          echo "========================================"
          echo "✅ Application deployed successfully!"
          echo "📍 Running on: http://localhost:${{ env.APP_PORT }}"
          echo "📍 API endpoint: http://localhost:${{ env.APP_PORT }}/api"
          echo "========================================"