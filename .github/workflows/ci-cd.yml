name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  APP_PORT: 3000
  DOMAIN: '3.109.217.207'  # Replace with your EC2 public IP

jobs:
  # ============================================
  # TEST JOB - Runs on Ubuntu Latest
  # ============================================
  test:
    name: Test Application
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Run Tests
        id: tests
        run: |
          echo "========================================"
          echo "Running Application Tests"
          echo "========================================"
          echo "Test started at: $(date)" > test-results.txt
          echo "========================================" >> test-results.txt
          
          if npm run check >> test-results.txt 2>&1; then
            echo "✅ Tests PASSED" >> test-results.txt
            echo "TEST_STATUS=passed" >> $GITHUB_OUTPUT
          else
            echo "❌ Tests FAILED" >> test-results.txt
            echo "TEST_STATUS=failed" >> $GITHUB_OUTPUT
            cat test-results.txt
            exit 1
          fi
          
          echo "========================================" >> test-results.txt
          echo "Test completed at: $(date)" >> test-results.txt
          cat test-results.txt
      
      - name: Upload Test Results Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.txt
          retention-days: 7
          if-no-files-found: error

  # ============================================
  # DEPLOY JOB - Runs on Self-Hosted Runner (EC2)
  # ============================================
  deploy:
    name: Deploy to EC2 with Nginx
    needs: test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: ./test-artifacts
      
      - name: Display Test Results
        run: |
          echo "========================================"
          echo "📋 TEST RESULTS FROM TEST JOB"
          echo "========================================"
          if [ -f "./test-artifacts/test-results.txt" ]; then
            cat ./test-artifacts/test-results.txt
            echo "========================================"
            echo "✅ Test results loaded successfully"
          else
            echo "⚠️ Warning: Test results file not found!"
          fi
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      # ============================================
      # NGINX SETUP - For External Access
      # ============================================
      - name: Install and Configure Nginx
        run: |
          echo "========================================"
          echo "🌐 INSTALLING AND CONFIGURING NGINX"
          echo "========================================"
          
          # Install Nginx if not present
          if ! command -v nginx &> /dev/null; then
            sudo apt update
            sudo apt install -y nginx
          fi
          
          # Create Nginx configuration for the app
          sudo tee /etc/nginx/sites-available/node-app > /dev/null <<EOF
          server {
              listen 80;
              server_name ${{ env.DOMAIN }};
              
              location / {
                  proxy_pass http://localhost:${{ env.APP_PORT }};
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade \$http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host \$host;
                  proxy_cache_bypass \$http_upgrade;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
              }
              
              location /api {
                  proxy_pass http://localhost:${{ env.APP_PORT }}/api;
                  proxy_http_version 1.1;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
              }
          }
          EOF
          
          # Enable the site
          sudo ln -sf /etc/nginx/sites-available/node-app /etc/nginx/sites-enabled/
          
          # Remove default site if exists
          sudo rm -f /etc/nginx/sites-enabled/default
          
          # Test Nginx configuration
          sudo nginx -t
          
          # Restart Nginx
          sudo systemctl restart nginx
          sudo systemctl enable nginx
          
          echo "✅ Nginx configured successfully"
      
      - name: Install Dependencies
        run: |
          echo "========================================"
          echo "📦 INSTALLING DEPENDENCIES"
          echo "========================================"
          npm ci
      
      - name: Stop Existing Application
        run: |
          echo "🛑 Stopping existing application..."
          if command -v pm2 &> /dev/null; then
            pm2 delete node-app || true
            pm2 save || true
          fi
          sudo fuser -k ${{ env.APP_PORT }}/tcp || true
        continue-on-error: true
      
      - name: Deploy Application with PM2
        id: deploy
        run: |
          echo "========================================"
          echo "🚀 DEPLOYING APPLICATION"
          echo "========================================"
          echo "Deployment started at: $(date)"
          
          # Install PM2 globally if not present
          if ! command -v pm2 &> /dev/null; then
            echo "📦 Installing PM2..."
            sudo npm install -g pm2
          fi
          
          # Start application with PM2
          echo "▶️ Starting application with PM2..."
          pm2 start src/server.js --name node-app --time
          
          # Save PM2 configuration
          pm2 save
          
          # Setup PM2 to start on boot
          pm2 startup | grep -v "sudo" | bash || true
          
          # Wait for application to start
          sleep 5
          
          # Verify application is running locally
          if curl -s http://localhost:${{ env.APP_PORT }}/ > /dev/null; then
            echo "✅ Application is running on port ${{ env.APP_PORT }}"
            echo "DEPLOY_STATUS=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Application failed to start"
            pm2 logs node-app --lines 20
            exit 1
          fi
          
          echo "Deployment completed at: $(date)"
      
      # ============================================
      # EXTERNAL ACCESS VERIFICATION
      # ============================================
      - name: Verify External Access via Nginx
        run: |
          echo "========================================"
          echo "🌍 VERIFYING EXTERNAL ACCESS"
          echo "========================================"
          
          # Get EC2 public IP (if not set in env)
          EC2_IP="${{ env.DOMAIN }}"
          if [ -z "$EC2_IP" ]; then
            EC2_IP=$(curl -s http://checkip.amazonaws.com)
          fi
          
          echo "Testing access via: http://$EC2_IP"
          
          # Test homepage via localhost (through Nginx)
          echo "Testing homepage through Nginx proxy..."
          HOMEPAGE_RESPONSE=$(curl -s -w "\nHTTP Status: %{http_code}" http://localhost/)
          echo "$HOMEPAGE_RESPONSE"
          
          # Test API endpoint via localhost (through Nginx)
          echo -e "\nTesting API endpoint through Nginx proxy..."
          API_RESPONSE=$(curl -s http://localhost/api)
          echo "API Response: $API_RESPONSE"
          
          echo "========================================"
          echo "✅ External access is configured!"
          echo "📍 Access your app at: http://$EC2_IP"
          echo "📍 API endpoint: http://$EC2_IP/api"
          echo "========================================"
      
      - name: Verify Nginx Status
        run: |
          echo "========================================"
          echo "🔍 NGINX STATUS"
          echo "========================================"
          sudo systemctl status nginx --no-pager
          echo ""
          echo "📋 Nginx enabled sites:"
          ls -la /etc/nginx/sites-enabled/
      
      - name: Show PM2 Status
        run: |
          echo "========================================"
          echo "📊 PM2 PROCESS STATUS"
          echo "========================================"
          pm2 status
          echo "========================================"
          echo "📋 Recent logs:"
          pm2 logs node-app --lines 10 --nostream
      
      - name: Deployment Summary
        run: |
          EC2_IP="${{ env.DOMAIN }}"
          echo "========================================"
          echo "🎉 DEPLOYMENT COMPLETE"
          echo "========================================"
          echo "✅ Application deployed successfully!"
          echo ""
          echo "📍 EXTERNAL ACCESS (via Nginx):"
          echo "   http://$EC2_IP"
          echo "   http://$EC2_IP/api"
          echo ""
          echo "📍 LOCAL ACCESS (direct):"
          echo "   http://localhost:${{ env.APP_PORT }}"
          echo "   http://localhost:${{ env.APP_PORT }}/api"
          echo ""
          echo "📍 Nginx Configuration:"
          echo "   /etc/nginx/sites-available/node-app"
          echo ""
          echo "📍 PM2 Management:"
          echo "   pm2 status"
          echo "   pm2 logs node-app"
          echo "   pm2 restart node-app"
          echo "========================================"
      
      # ============================================
      # HEALTH CHECK (Public URL)
      # ============================================
      - name: Health Check via Public URL
        run: |
          echo "========================================"
          echo "🏥 HEALTH CHECK (Public URL)"
          echo "========================================"
          EC2_IP="${{ env.DOMAIN }}"
          
          # Wait a few seconds for Nginx to fully start
          sleep 3
          
          # Test public access
          if curl -s --max-time 10 http://$EC2_IP/ > /dev/null; then
            echo "✅ Application is accessible from outside!"
          else
            echo "⚠️ Could not verify external access. Check security group settings."
            echo "   Make sure port 80 (HTTP) is open in EC2 security group."
          fi